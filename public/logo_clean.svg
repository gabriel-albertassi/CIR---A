<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente Principal Premium -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b6;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#90e0ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0096c7;stop-opacity:1" />
    </linearGradient>

    <!-- Reflexo Horizontal Cristalino -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="48%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.7" />
      <stop offset="52%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="54%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>

    <!-- Brilho Neon para o Pulso -->
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.6"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Elementos do Logo -->
  <g transform="translate(25, 50)">
    
    <!-- CIR -->
    <text x="0" y="100" font-family="Arial, Sans-Serif" font-size="140" font-weight="900" fill="url(#glassGradient)" filter="url(#textShadow)" style="letter-spacing: -6px;">
      CIR
    </text>
    
    <!-- Pulso Neon (Mais grosso e com brilho) -->
    <path d="M245 75 L280 75 L310 10 L345 130 L375 75 L420 75" 
          stroke="#00d8ff" stroke-width="12" fill="none" 
          stroke-linecap="round" stroke-linejoin="round" 
          filter="url(#pulseGlow)" />
    
    <!-- -A -->
    <text x="430" y="100" font-family="Arial, Sans-Serif" font-size="140" font-weight="900" fill="url(#glassGradient)" filter="url(#textShadow)" style="letter-spacing: -6px;">
      -A
    </text>

    <!-- Camada de Brilho Horizontal -->
    <g pointer-events="none">
      <text x="0" y="100" font-family="Arial, Sans-Serif" font-size="140" font-weight="900" fill="url(#shineGradient)" style="letter-spacing: -6px;">
        CIR
      </text>
      <text x="430" y="100" font-family="Arial, Sans-Serif" font-size="140" font-weight="900" fill="url(#shineGradient)" style="letter-spacing: -6px;">
        -A
      </text>
    </g>
  </g>
</svg>

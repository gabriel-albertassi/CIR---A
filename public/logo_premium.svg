<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente Principal - Ciano Tecnológico -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b6;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#90e0ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0096c7;stop-opacity:1" />
    </linearGradient>

    <!-- Efeito de Brilho Horizontal (Apple Glass Style) -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="48%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="52%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="54%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>

    <!-- Sombra para profundidade -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.5"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Grupo Principal do Logo Centralizado -->
  <g transform="translate(30, 10)">
    
    <!-- Texto CIR -->
    <text x="0" y="80" font-family="Arial, Sans-Serif" font-size="100" font-weight="900" fill="url(#glassGradient)" filter="url(#textShadow)" style="letter-spacing: -4px;">
      CIR
    </text>
    
    <!-- Ícone de Pulso / Conexão (Centralizado entre CIR e -A) -->
    <path d="M185 60 L210 60 L230 15 L255 95 L275 60 L310 60" stroke="#00d8ff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#textShadow)" />
    
    <!-- Texto -A -->
    <text x="320" y="80" font-family="Arial, Sans-Serif" font-size="100" font-weight="900" fill="url(#glassGradient)" filter="url(#textShadow)" style="letter-spacing: -4px;">
      -A
    </text>

    <!-- Camada de Brilho "Glossy" Horizontal Atravessando as Letras -->
    <g pointer-events="none">
      <text x="0" y="80" font-family="Arial, Sans-Serif" font-size="100" font-weight="900" fill="url(#shineGradient)" style="letter-spacing: -4px;">
        CIR
      </text>
      <text x="320" y="80" font-family="Arial, Sans-Serif" font-size="100" font-weight="900" fill="url(#shineGradient)" style="letter-spacing: -4px;">
        -A
      </text>
      <!-- Brilho no Pulso -->
      <path d="M185 60 L310 60" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none" opacity="0.5" />
    </g>

    <!-- Subtítulo Fiel ao Esboço -->
    <text x="270" y="125" text-anchor="middle" font-family="Arial, Sans-Serif" font-size="20" font-weight="900" fill="#ffffff" style="letter-spacing: 0px; text-transform: uppercase;">
      CENTRAL INTELIGENTE DE REGULAÇÃO AUTOMATIZADA
    </text>
  </g>
</svg>

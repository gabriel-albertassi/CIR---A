<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b6;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#90e0ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0096c7;stop-opacity:1" />
    </linearGradient>
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="#001219" />
  <g transform="translate(56, 120)">
    <path d="M0 136 L70 136 L130 10 L200 250 L260 136 L350 136" 
          stroke="#00d8ff" stroke-width="25" fill="none" 
          stroke-linecap="round" stroke-linejoin="round" 
          filter="url(#pulseGlow)" />
    <text x="175" y="320" text-anchor="middle" font-family="Arial, Sans-Serif" font-size="120" font-weight="900" fill="url(#glassGradient)" style="letter-spacing: -5px;">CIR-A</text>
  </g>
</svg>
